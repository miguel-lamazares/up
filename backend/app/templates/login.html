<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DexWarehouse</title>

    <link rel="icon" href="/static/img/icon.png">
    <link rel="stylesheet" href="/static/css/login.css">
    <script src="/static/js/login.js" defer></script>
</head>

<body>
    <div class="main">
        <div class="image">
            <h1>Acesse sua conta<br>para aproveitar nossas ferramentas</h1>
            <img class="img" src="/static/img/animate.svg" alt="Ilustração">
        </div>

        <div class="login">
            <form class="card" method="post" action="/login">
                <h1>Login</h1>

                <div class="form">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Usuário" value="{{ username or '' }}" required>
                </div>

                <div class="form">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Senha" required>
                </div>

                <button class="btn-login" type="submit">Entrar</button>

                {% if erro %}
                <div class="error-message">
                    {{ erro }}
                </div>
                {% endif %}
            </form>
        </div>
    </div>
</body>

</html>
